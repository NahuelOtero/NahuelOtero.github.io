<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Transportador</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .title-header {
            padding: 20px 10px;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            color: #ffc107;
            letter-spacing: 2px;
        }
        .main-image {
            width: 100%;
            display: block;
            border-top: 3px solid #ffc107;
            border-bottom: 3px solid #ffc107;
        }
        /* Lower section with background image and layered content */
        .lower-section-wrapper {
            position: relative;
            background-image: url('fondo_2.png');
            background-size: cover;
            background-position: center;
            padding: 30px 20px;
            min-height: 400px; /* Adjust as needed */
        }
       /* Overlay ajustado para que se vea el fondo */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Cambiamos 0.85 (muy oscuro) a 0.5 (semi-transparente) */
            background: rgba(11, 12, 16, 0.5); 
            z-index: 1;
        }
        .content-layer {
            position: relative;
            z-index: 2;
        }
        .regla-box {
            background: #333;
            border-left: 4px solid #ffc107;
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
        }
        .regla-titulo { color: #ffc107; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .regla-texto { font-size: 14px; font-style: italic; }
        .info-box {
            border: 2px solid #45f3ff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .info-item { margin-bottom: 10px; }
        .label { font-size: 10px; color: #66fcf1; text-transform: uppercase; display: block; }
        .value { font-size: 16px; font-weight: bold; font-family: monospace; }
        .btn-copy {
            background-color: #ffc107;
            color: #0b0c10;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }
        .footer-note { font-size: 11px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-header">El Transportador</div>
        <img src="el_transportador.png" alt="Imagen Principal" class="main-image">
        
        <div class="lower-section-wrapper">
            <div class="overlay"></div>
            <div class="content-layer">
                <div class="regla-box">
                    <div class="regla-titulo">REGLA N° 4</div>
                    <div class="regla-texto">"Su paquete llegó intacto. Usted llegó a destino. La entrega fue un éxito... ahora le toca a su transferencia."</div>
                </div>
                <div class="info-box">
                    <div class="info-item"><span class="label">Titular</span><span class="value">Carlos Nahuel Otero</span></div>
                    <div class="info-item"><span class="label">Destino</span><span class="value">Mercado Pago</span></div>
                    <div class="info-item"><span class="label">CVU</span><span class="value">0000003100075036225057</span></div>
                </div>
                <button class="btn-copy">COPIAR CVU</button>
                <div class="footer-note">*(Las propinas no rompen las reglas de la misión)</div>
            </div>
        </div>
    </div>
</body>
</html>
