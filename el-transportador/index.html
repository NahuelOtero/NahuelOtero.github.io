<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Transportador - Cobros - Nahuel Otero</title>
    <style>
        /* ESTILOS BASE Y RESPONSIVE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0c10; /* Negro profundo */
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CONTENEDOR PRINCIPAL (LA TARJETA) */
        .card {
            background: #1f2833; /* Gris oscuro metálico */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            max-width: 400px; /* Ancho máximo para desktop */
            width: 100%; /* Ancho completo en móvil */
            overflow: hidden; /* Para que la imagen respete los bordes redondeados */
            border-top: 5px solid #ffc107; /* Amarillo deportivo */
            display: flex;
            flex-direction: column;
        }

        /* IMAGEN DE CABECERA (TU FOTO DE EL TRANSPORTADOR) */
        .header-image {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9; /* Mantiene la proporción de la foto */
            object-fit: cover; /* Ajusta la foto sin deformarla */
            display: block;
        }

        /* SECCIÓN DE TEXTO Y DATOS */
        .content {
            padding: 25px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .sub {
            color: #ffc107; /* Amarillo */
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* CAJA DE INFORMACIÓN DEL CVU */
        .info-box {
            background-color: #0b0c10;
            border: 1px solid #45f3ff; /* Cian tecnológico */
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 25px;
            text-align: left;
        }

        .info-item {
            margin-bottom: 12px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #66fcf1; /* Celeste cian */
            font-weight: bold;
            display: block;
            margin-bottom: 3px;
        }

        .value {
            font-size: 16px;
            font-weight: 600;
            word-break: break-all; /* Rompe el CVU largo si es necesario */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; /* Tipografía monoespaciada para el número */
        }

        /* BOTÓN DE COPIADO */
        .btn-copy {
            background-color: #ffc107; /* Amarillo */
            color: #0b0c10;
            border: none;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3);
        }

        .btn-copy:active {
            background-color: #e0a800;
            transform: scale(0.97);
        }

        /* MENSAJE DE ÉXITO */
        .success-text {
            color: #2befb1; /* Verde brillante */
            font-weight: bold;
            margin-top: 15px;
            font-size: 15px;
            height: 20px; /* Espacio reservado */
            visibility: hidden; /* Oculto por defecto */
        }

        /* MEDIA QUERY PARA AJUSTES EN PANTALLAS PEQUEÑAS (MÓVILES) */
        @media (max-width: 480px) {
            body {
                padding: 10px; /* Menos espacio alrededor en móvil */
            }
            .card {
                border-radius: 12px; /* Bordes un poco menos redondeados */
            }
            .content {
                padding: 20px; /* Menos padding interno */
            }
            h1 {
                font-size: 20px; /* Título más pequeño */
            }
            .sub {
                font-size: 12px; /* Subtítulo más pequeño */
            }
            .value {
                font-size: 14px; /* CVU un poco más pequeño para que entre */
            }
            .btn-copy {
                font-size: 16px; /* Botón un poco más pequeño */
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Esta línea ahora carga tu foto de artista desde tu repositorio -->
    <img src="foto-artista.jpg" alt="Nahuel Otero - El Transportador" class="header-image">

    <div class="content">
        <h1>El Transportador</h1>
        <p class="sub">Regla N° 4: El pago siempre a término</p>

        <div class="info-box">
            <div class="info-item">
                <span class="label">Destinatario</span>
                <span class="value">Carlos Nahuel Otero</span>
            </div>
            <div class="info-item">
                <span class="label">Plataforma</span>
                <span class="value">Mercado Pago</span>
            </div>
            <div class="info-item">
                <span class="label">CVU</span>
                <!-- Tu CVU real listo para copiar -->
                <span class="value" id="cvu-text">0000003100075036225057</span>
            </div>
        </div>

        <button class="btn-copy" onclick="copiarAlPortapapeles()">Copiar CVU</button>
        <div id="msg-copiado" class="success-text">¡CVU copiado! Listo para pegar</div>
    </div>
</div>

<script>
    function copiarAlPortapapeles() {
        const cvu = document.getElementById('cvu-text').innerText;
        
        navigator.clipboard.writeText(cvu).then(() => {
            const msg = document.getElementById('msg-copiado');
            msg.style.visibility = 'visible';
            
            setTimeout(() => {
                msg.style.visibility = 'hidden';
            }, 3000);
        }).catch(err => {
            alert('Error al copiar. El CVU es: ' + cvu);
        });
    }
</script>

</body>
</html>
