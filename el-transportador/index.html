<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Transportador - Cobros</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0c10; /* Negro profundo */
            color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #1f2833; /* Gris oscuro metálico */
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border-top: 4px solid #ffc107; /* Amarillo deportivo de advertencia */
        }
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sub {
            color: #ffc107; /* Amarillo */
            font-size: 13px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-box {
            background-color: #0b0c10;
            border: 1px solid #45f3ff; /* Un toque celeste/cian tecnológico */
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 15px;
            text-align: left;
        }
        .info-box div {
            margin-bottom: 10px;
        }
        .info-box div:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #66fcf1; /* Celeste cian */
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }
        .value {
            font-size: 15px;
            font-weight: 600;
            word-break: break-all;
            color: #ffffff;
        }
        .btn-copy {
            background-color: #ffc107; /* Amarillo "El Transportador" */
            color: #0b0c10;
            border: none;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-copy:active {
            background-color: #e0a800;
            transform: scale(0.98);
        }
        .success-text {
            color: #2befb1;
            font-weight: bold;
            margin-top: 12px;
            font-size: 14px;
            height: 20px;
            visibility: hidden;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>El Transportador</h1>
    <p class="sub">Regla N° 4: El pago siempre a término</p>

    <div class="info-box">
        <div>
            <span class="label">Destinatario</span>
            <span class="value">Carlos Nahuel Otero</span> <!-- Tu nombre tal como figura en MP -->
        </div>
        <div>
            <span class="label">Plataforma</span>
            <span class="value">Mercado Pago</span>
        </div>
        <div>
            <span class="label">Alias</span>
            <span class="value">oteros</span>
        </div>
        <div>
            <span class="label">CVU</span>
            <span class="value" id="cvu-text">0000003100075036225057</span> <!-- ACÁ VA TU CVU REAL -->
        </div>
    </div>

    <button class="btn-copy" onclick="copiarAlPortapapeles()">Copiar CVU</button>
    <div id="msg-copiado" class="success-text">¡CVU copiado! Listo para pegar</div>
</div>

<script>
    function copiarAlPortapapeles() {
        const cvu = document.getElementById('cvu-text').innerText;
        
        navigator.clipboard.writeText(cvu).then(() => {
            const msg = document.getElementById('msg-copiado');
            msg.style.visibility = 'visible';
            
            setTimeout(() => {
                msg.style.visibility = 'hidden';
            }, 3000);
        }).catch(err => {
            alert('Error al copiar. Por favor, selecciona y copia el CVU manualmente.');
        });
    }
</script>

</body>
</html>
